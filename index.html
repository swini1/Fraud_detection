<!DOCTYPE html>
<html>
<head>
<title>AI Fraud Detection</title>
<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

input{
padding:10px;
margin:10px;
width:250px;
}

button{
padding:10px 20px;
background:#22c55e;

}

<body>

<h1>AI Fraud Detection System</h1>

<form action="/predict" method="post">

<input type="number" name="newbalance" placeholder="New Balance" required><br>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>
